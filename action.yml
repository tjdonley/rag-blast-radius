name: RAG Blast Radius
description: Pre-deploy safety checks for RAG manifest changes
author: tjdonley

inputs:
  old_manifest:
    description: Path to the baseline RAG manifest.
    required: true
  new_manifest:
    description: Path to the proposed RAG manifest.
    required: true
  fail_on:
    description: >
      Exit with code 1 when risk is at least this threshold. Use none to report only;
      unassessed changes fail when any threshold is enabled.
    required: false
    default: high
  format:
    description: Report format to print in logs: text or json.
    required: false
    default: text
  python_version:
    description: Python version used to install and run rag-blast.
    required: false
    default: "3.12"
  pr_comment:
    description: Post or update a pull request comment with the report.
    required: false
    default: "false"
  github_token:
    description: GitHub token used when pr_comment is true.
    required: false
    default: ""

outputs:
  risk:
    description: Top-level report risk: NONE, UNASSESSED, LOW, MEDIUM, or HIGH.
    value: ${{ steps.run.outputs.risk }}
  change_count:
    description: Number of detected manifest changes.
    value: ${{ steps.run.outputs.change_count }}
  finding_count:
    description: Number of triggered risk findings.
    value: ${{ steps.run.outputs.finding_count }}
  unassessed_change_count:
    description: Number of detected changes that no rule assessed.
    value: ${{ steps.run.outputs.unassessed_change_count }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install rag-blast
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run rag-blast
      id: run
      shell: bash
      env:
        OLD_MANIFEST: ${{ inputs.old_manifest }}
        NEW_MANIFEST: ${{ inputs.new_manifest }}
        FAIL_ON: ${{ inputs.fail_on }}
        REPORT_FORMAT: ${{ inputs.format }}
        PR_COMMENT: ${{ inputs.pr_comment }}
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -uo pipefail

        REPORT_FORMAT=$(printf '%s' "$REPORT_FORMAT" | tr '[:upper:]' '[:lower:]')
        FAIL_ON=$(printf '%s' "$FAIL_ON" | tr '[:upper:]' '[:lower:]')
        PR_COMMENT=$(printf '%s' "$PR_COMMENT" | tr '[:upper:]' '[:lower:]')

        case "$REPORT_FORMAT" in
          text|json) ;;
          *)
            echo "::error::Unsupported report format: $REPORT_FORMAT. Use text or json."
            exit 1
            ;;
        esac

        case "$FAIL_ON" in
          none|low|medium|high) ;;
          *)
            echo "::error::Unsupported fail_on threshold: $FAIL_ON. Use none, low, medium, or high."
            exit 1
            ;;
        esac

        case "$PR_COMMENT" in
          true|false) ;;
          *)
            echo "::error::Unsupported pr_comment value: $PR_COMMENT. Use true or false."
            exit 1
            ;;
        esac

        TEXT_REPORT="$RUNNER_TEMP/rag-blast-report.out"
        JSON_REPORT="$RUNNER_TEMP/rag-blast-report.json"

        set +e
        rag-blast check \
          --old "$OLD_MANIFEST" \
          --new "$NEW_MANIFEST" \
          --format "$REPORT_FORMAT" \
          --fail-on "$FAIL_ON" | tee "$TEXT_REPORT"
        status=${PIPESTATUS[0]}
        set -e

        if [ "$REPORT_FORMAT" = "json" ]; then
          cp "$TEXT_REPORT" "$JSON_REPORT"
        else
          set +e
          rag-blast check \
            --old "$OLD_MANIFEST" \
            --new "$NEW_MANIFEST" \
            --format json \
            --fail-on none > "$JSON_REPORT"
          json_status=$?
          set -e

          if [ "$json_status" -ne 0 ]; then
            if [ "$status" -ne 0 ]; then
              exit "$status"
            fi
            exit "$json_status"
          fi
        fi

        if ! python - "$JSON_REPORT" >/dev/null 2>&1 <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as report_file:
            json.load(report_file)
        PY
        then
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          echo "::error::rag-blast did not produce a valid JSON report."
          exit 1
        fi

        python - "$JSON_REPORT" <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as report_file:
            report = json.load(report_file)

        print(f"risk={report['risk']}")
        print(f"change_count={report['change_count']}")
        print(f"finding_count={report['finding_count']}")
        print(f"unassessed_change_count={report['unassessed_change_count']}")
        PY

        python - "$JSON_REPORT" <<'PY' >> "$GITHUB_STEP_SUMMARY"
        import json
        import sys

        from rag_blast.report import render_markdown_report

        with open(sys.argv[1], encoding="utf-8") as report_file:
            report = json.load(report_file)

        print(render_markdown_report(report))
        PY

        if [ "$PR_COMMENT" = "true" ]; then
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::pr_comment requested but github_token was not provided; skipping PR comment."
          elif [ -z "${GITHUB_EVENT_PATH:-}" ] || [ ! -f "$GITHUB_EVENT_PATH" ]; then
            echo "::notice::pr_comment requested but no GitHub event payload was available; skipping PR comment."
          else
            PR_NUMBER=$(python - "$GITHUB_EVENT_PATH" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as event_file:
            event = json.load(event_file)

        pull_request = event.get("pull_request") or {}
        print(pull_request.get("number", ""))
        PY
        )

            if [ -z "$PR_NUMBER" ]; then
              echo "::notice::pr_comment requested outside a pull_request event; skipping PR comment."
            elif [ -z "${GITHUB_REPOSITORY:-}" ]; then
              echo "::notice::pr_comment requested but GITHUB_REPOSITORY was unavailable; skipping PR comment."
            else
              COMMENT_BODY="$RUNNER_TEMP/rag-blast-pr-comment.md"
              COMMENT_PAYLOAD="$RUNNER_TEMP/rag-blast-pr-comment.json"
              COMMENTS_JSONL="$RUNNER_TEMP/rag-blast-comments.jsonl"

              python - "$JSON_REPORT" "$COMMENT_BODY" <<'PY'
        import json
        import sys

        from rag_blast.report import render_markdown_report

        with open(sys.argv[1], encoding="utf-8") as report_file:
            report = json.load(report_file)

        with open(sys.argv[2], "w", encoding="utf-8") as comment_file:
            comment_file.write("<!-- rag-blast-radius-report -->\n\n")
            comment_file.write(render_markdown_report(report))
            comment_file.write("\n")
        PY

              python - "$COMMENT_BODY" "$COMMENT_PAYLOAD" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as body_file:
            body = body_file.read()

        with open(sys.argv[2], "w", encoding="utf-8") as payload_file:
            json.dump({"body": body}, payload_file)
        PY

              if ! gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate --jq '.[] | {id, body} | @json' > "$COMMENTS_JSONL"; then
                echo "::warning::Unable to fetch existing PR comments; skipping PR comment."
              else
                COMMENT_ID=$(python - "$COMMENTS_JSONL" <<'PY'
        import json
        import sys

        marker = "<!-- rag-blast-radius-report -->"
        with open(sys.argv[1], encoding="utf-8") as comments_file:
            for line in comments_file:
                if not line.strip():
                    continue
                comment = json.loads(line)
                if marker in comment.get("body", ""):
                    print(comment["id"])
                    break
        PY
        )

                if [ -n "$COMMENT_ID" ]; then
                  if ! gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --input "$COMMENT_PAYLOAD" >/dev/null; then
                    echo "::warning::Unable to update existing PR comment."
                  fi
                else
                  if ! gh api -X POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --input "$COMMENT_PAYLOAD" >/dev/null; then
                    echo "::warning::Unable to create PR comment."
                  fi
                fi
              fi
            fi
          fi
        fi

        if [ "$status" -ne 0 ]; then
          python - "$JSON_REPORT" "$FAIL_ON" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as report_file:
            report = json.load(report_file)

        print(
            "::error title=RAG Blast Radius blocked::"
            f"risk={report['risk']}; fail_on={sys.argv[2]}; "
            f"findings={report['finding_count']}; "
            f"unassessed_changes={report['unassessed_change_count']}"
        )
        PY
        fi

        exit "$status"
